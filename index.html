  <!-- Canvas starfield -->
  <script>
    (function () {
      const canvas = document.getElementById('starfield');
      const ctx    = canvas.getContext('2d');
      let stars = [], sparks = [], W, H;

      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);

      function rand(min, max) { return Math.random() * (max - min) + min; }

      function makeStar() {
        return {
          x: rand(0, W), y: rand(0, H), r: rand(0.4, 1.8),
          alpha: rand(0.3, 1), twinkleSpeed: rand(0.003, 0.012),
          twinkleOffset: rand(0, Math.PI * 2),
          color: Math.random() < 0.15 ? (Math.random() < 0.5 ? 'rose' : 'gold') : 'white',
        };
      }

      function makeSpark() {
        return {
          x: rand(0, W), y: rand(0, H), size: rand(3, 9),
          alpha: 0, life: 0, maxLife: rand(60, 120),
          color: Math.random() < 0.5 ? 'rose' : 'gold',
        };
      }

      for (let i = 0; i < 220; i++) stars.push(makeStar());
      for (let i = 0; i <  12; i++) sparks.push(makeSpark());

      function drawFourStar(x, y, size, alpha, color) {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(x, y);
        const c = color === 'rose' ? 'oklch(72% 0.18 10)' : 'oklch(78% 0.14 65)';
        ctx.fillStyle = c; ctx.shadowColor = c; ctx.shadowBlur = size * 3;
        ctx.beginPath();
        for (let i = 0; i < 4; i++) {
          const a = (i / 4) * Math.PI * 2, b = a + Math.PI / 4;
          ctx.lineTo(Math.cos(a) * size, Math.sin(a) * size);
          ctx.lineTo(Math.cos(b) * size * 0.18, Math.sin(b) * size * 0.18);
        }
        ctx.closePath(); ctx.fill(); ctx.restore();
      }

      let frame = 0;
      function tick() {
        ctx.clearRect(0, 0, W, H); frame++;
        for (const s of stars) {
          const pulse = Math.sin(frame * s.twinkleSpeed + s.twinkleOffset);
          const a = s.alpha * (0.5 + 0.5 * pulse);
          ctx.save(); ctx.globalAlpha = Math.max(0, a);
          if      (s.color === 'rose') { ctx.fillStyle='oklch(85% 0.12 10)'; ctx.shadowColor='oklch(72% 0.18 10)'; ctx.shadowBlur=s.r*4; }
          else if (s.color === 'gold') { ctx.fillStyle='oklch(90% 0.1 65)';  ctx.shadowColor='oklch(78% 0.14 65)'; ctx.shadowBlur=s.r*4; }
          else                         { ctx.fillStyle='oklch(96% 0.02 290)'; ctx.shadowBlur=0; }
          ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        }
        for (const sp of sparks) {
          sp.life++;
          const t = sp.life / sp.maxLife;
          sp.alpha = t < 0.2 ? t / 0.2 : t > 0.7 ? (1 - t) / 0.3 : 1;
          drawFourStar(sp.x, sp.y, sp.size * sp.alpha, sp.alpha * 0.9, sp.color);
          if (sp.life >= sp.maxLife) {
            sp.x = rand(0,W); sp.y = rand(0,H); sp.size = rand(3,9);
            sp.life = 0; sp.maxLife = rand(60,120);
            sp.color = Math.random() < 0.5 ? 'rose' : 'gold';
          }
        }
        requestAnimationFrame(tick);
      }
      tick();
    }());
  </script>

  <!-- ═══════════════════════════════════ React App ═══════════════════════════════ -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── CONFIG ───────────────────────────────────────────────────────────────
    const QUIZ_LENGTH  = 15;
    const MAX_PER_SONG = 2;

    // ── ERA COLOURS ──────────────────────────────────────────────────────────
    const ERA_COLORS = {
      "Taylor Swift":                  "#7a9e7e",
      "Fearless":                      "#c8a84b",
      "Speak Now":                     "#9b6fb5",
      "Red":                           "#c04040",
      "1989":                          "#7ab0c8",
      "reputation":                    "#888888",
      "Lover":                         "#d980a0",
      "folklore":                      "#8a8a7a",
      "evermore":                      "#9a7a5a",
      "Midnights":                     "#6060aa",
      "The Tortured Poets Department": "#b0a898",
    };

    // ── HELPERS ──────────────────────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ── SOUND ENGINE ─────────────────────────────────────────────────────────
    const audioCtx = { current: null };
    function getCtx() {
      if (!audioCtx.current) {
        audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.current.state === 'suspended') {
        audioCtx.current.resume();
      }
      return audioCtx.current;
    }

    // Karplus-Strong plucked string synthesis with optional warmth filter
    function pluckString(ctx, freq, volume, startTime, decay, cutoff) {
      const sr  = ctx.sampleRate;
      const len = Math.round(sr / freq);
      const dur = Math.ceil(sr * 2.8);

      // Seed buffer with white noise
      const seed = new Float32Array(len);
      for (let i = 0; i < len; i++) seed[i] = Math.random() * 2 - 1;

      // Run Karplus-Strong feedback loop into output buffer
      const out  = ctx.createBuffer(1, dur, sr);
      const data = out.getChannelData(0);
      const ring = seed.slice();
      for (let i = 0; i < dur; i++) {
        const idx  = i % len;
        data[i]    = ring[idx];
        ring[idx]  = decay * 0.5 * (ring[idx] + ring[(idx + 1) % len]);
      }

      const src   = ctx.createBufferSource();
      const gain  = ctx.createGain();
      const filt  = ctx.createBiquadFilter();
      filt.type = 'lowpass';
      filt.frequency.value = cutoff || 8000;

      src.buffer = out;
      gain.gain.setValueAtTime(volume, startTime);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + 2.5);
      src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
      src.start(startTime); src.stop(startTime + 2.6);
    }

    // Correct — warm fingerpicked G major arpeggio, rolled slowly with treble rolled off
    function playCorrect() {
      const ctx = getCtx();
      // G3 B3 D4 G4 — unhurried strum, lowpass keeps it cosy
      [[196.00, 0],
       [246.94, 0.09],
       [293.66, 0.18],
       [392.00, 0.28]].forEach(([freq, offset]) => {
        pluckString(ctx, freq, 0.52, ctx.currentTime + offset, 0.998, 2200);
      });
    }

    // Wrong — gentle descending minor third, like a quiet "not quite"
    function playWrong() {
      const ctx = getCtx();
      // D3 → B2 — two notes, slightly muted but not a thud
      [[146.83, 0],
       [123.47, 0.12]].forEach(([freq, offset]) => {
        pluckString(ctx, freq, 0.45, ctx.currentTime + offset, 0.972, 1400);
      });
    }

    function formatTime(ms) {
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      return m > 0 ? `${m}:${String(s % 60).padStart(2, '0')}` : `${s}s`;
    }

    // ── QUIZ BUILDING (wired to LyricsEngine from lyrics.js) ─────────────────
    function buildQuiz() {
      const pool        = (window.LyricsEngine && window.LyricsEngine.getSnippetPool()) || [];
      const allTitles   = (window.SONGS || []).map(s => s.title);
      const shuffled    = shuffle(pool);
      const selected    = [];
      const songCount   = {};

      for (const s of shuffled) {
        if (selected.length >= QUIZ_LENGTH) break;
        const cnt = songCount[s.song] || 0;
        if (cnt < MAX_PER_SONG) { selected.push(s); songCount[s.song] = cnt + 1; }
      }

      return selected.map(snippet => {
        const wrongs = shuffle(allTitles.filter(t => t !== snippet.song)).slice(0, 5);
        return {
          lyric:   snippet.lyric,
          answer:  snippet.song,
          era:     snippet.album,
          options: shuffle([snippet.song, ...wrongs]),
        };
      });
    }

    // ── TWEAKS HOOK ──────────────────────────────────────────────────────────
    function useTweaks(defaults) {
      const [values, setValues] = useState(defaults);
      const setTweak = useCallback((keyOrEdits, val) => {
        const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
          ? keyOrEdits : { [keyOrEdits]: val };
        setValues(prev => ({ ...prev, ...edits }));
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
      }, []);
      return [values, setTweak];
    }

    // ── TWEAKS PANEL ─────────────────────────────────────────────────────────
    function TweaksPanel({ title = 'Tweaks', children }) {
      const [open, setOpen] = useState(false);
      const dragRef         = useRef(null);
      const offsetRef       = useRef({ x: 16, y: 16 });
      const PAD             = 16;

      const clamp = useCallback(() => {
        const p = dragRef.current; if (!p) return;
        const maxR = Math.max(PAD, window.innerWidth  - p.offsetWidth  - PAD);
        const maxB = Math.max(PAD, window.innerHeight - p.offsetHeight - PAD);
        offsetRef.current = {
          x: Math.min(maxR, Math.max(PAD, offsetRef.current.x)),
          y: Math.min(maxB, Math.max(PAD, offsetRef.current.y)),
        };
        p.style.right  = offsetRef.current.x + 'px';
        p.style.bottom = offsetRef.current.y + 'px';
      }, []);

      useEffect(() => {
        if (!open) return;
        clamp();
        if (typeof ResizeObserver !== 'undefined') {
          const ro = new ResizeObserver(clamp);
          ro.observe(document.documentElement);
          return () => ro.disconnect();
        }
        window.addEventListener('resize', clamp);
        return () => window.removeEventListener('resize', clamp);
      }, [open, clamp]);

      useEffect(() => {
        const onMsg = e => {
          if (e?.data?.type === '__activate_edit_mode')   setOpen(true);
          if (e?.data?.type === '__deactivate_edit_mode') setOpen(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const dismiss = () => {
        setOpen(false);
        window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
      };

      const onDragStart = e => {
        const p = dragRef.current; if (!p) return;
        const r = p.getBoundingClientRect();
        const sx = e.clientX, sy = e.clientY;
        const sr = window.innerWidth - r.right, sb = window.innerHeight - r.bottom;
        const move = ev => { offsetRef.current = { x: sr-(ev.clientX-sx), y: sb-(ev.clientY-sy) }; clamp(); };
        const up   = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
      };

      if (!open) return null;
      return (
        <div ref={dragRef} className="twk-panel"
             style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
          <div className="twk-hd" onMouseDown={onDragStart}>
            <b>{title}</b>
            <button className="twk-x" onMouseDown={e => e.stopPropagation()} onClick={dismiss}>✕</button>
          </div>
          <div className="twk-body">{children}</div>
        </div>
      );
    }

    function TweakSection({ label }) {
      return <div className="twk-sect">{label}</div>;
    }

    function TweakRow({ label, value, children, inline = false }) {
      return (
        <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
          <div className="twk-lbl">
            <span>{label}</span>
            {value != null && <span className="twk-val">{value}</span>}
          </div>
          {children}
        </div>
      );
    }

    function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
      return (
        <TweakRow label={label} value={`${value}${unit}`}>
          <input type="range" className="twk-slider" min={min} max={max} step={step}
                 value={value} onChange={e => onChange(Number(e.target.value))} />
        </TweakRow>
      );
    }

    function TweakToggle({ label, value, onChange }) {
      return (
        <div className="twk-row twk-row-h">
          <div className="twk-lbl"><span>{label}</span></div>
          <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
                  role="switch" aria-checked={!!value}
                  onClick={() => onChange(!value)}><i /></button>
        </div>
      );
    }

    function TweakRadio({ label, value, options, onChange }) {
      const trackRef = useRef(null);
      const [drag, setDrag] = useState(false);
      const opts   = options.map(o => typeof o === 'object' ? o : { value: o, label: o });
      const n      = opts.length;
      const idx    = Math.max(0, opts.findIndex(o => o.value === value));
      const valRef = useRef(value);
      valRef.current = value;

      const segAt = clientX => {
        const r = trackRef.current.getBoundingClientRect();
        const i = Math.floor(((clientX - r.left - 2) / (r.width - 4)) * n);
        return opts[Math.max(0, Math.min(n - 1, i))].value;
      };

      const onPointerDown = e => {
        setDrag(true);
        const v0 = segAt(e.clientX); if (v0 !== valRef.current) onChange(v0);
        const move = ev => { if (trackRef.current) { const v = segAt(ev.clientX); if (v !== valRef.current) onChange(v); } };
        const up   = () => { setDrag(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', up);
      };

      return (
        <TweakRow label={label}>
          <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
               className={drag ? 'twk-seg dragging' : 'twk-seg'}>
            <div className="twk-seg-thumb"
                 style={{ left:`calc(2px + ${idx}*(100% - 4px)/${n})`, width:`calc((100% - 4px)/${n})` }} />
            {opts.map(o => (
              <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>
            ))}
          </div>
        </TweakRow>
      );

    // ── PROGRESS BAR ─────────────────────────────────────────────────────────
    function ProgressBar({ current, total, results }) {
      return (
        <div style={{ width: '100%', marginBottom: 24 }}>
          <div style={{ display: 'flex', gap: 4, marginBottom: 8 }}>
            {Array.from({ length: total }).map((_, i) => (
              <div key={i} style={{
                flex: 1, height: 4, borderRadius: 2,
                background: results[i] === 'correct' ? 'var(--correct)'
                  : results[i] === 'wrong' ? 'var(--wrong)'
                  : i === current ? 'var(--rose)' : 'var(--border)',
                transition: 'background 0.3s ease',

          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: 'var(--text-dim)' }}>

        </div>

    // ── OPTION BUTTON ────────────────────────────────────────────────────────
    function OptionButton({ label, state, onClick, disabled }) {
      const [hov, setHov] = useState(false);
      const isC = state === 'correct', isW = state === 'wrong';
      return (
        <button
          onClick={disabled ? undefined : onClick}
          onMouseEnter={() => setHov(true)}
          onMouseLeave={() => setHov(false)}
          style={{
            background: isC ? 'var(--correct-bg)' : isW ? 'var(--wrong-bg)'
              : hov && !disabled ? 'var(--surface2)' : 'var(--surface)',
            border: `1.5px solid ${isC ? 'var(--correct)' : isW ? 'var(--wrong)'
              : hov && !disabled ? 'var(--purple)' : 'var(--border)'}`,
            borderRadius: 12, padding: '13px 18px',
            color: isC ? 'var(--correct)' : isW ? 'var(--wrong)' : 'var(--text)',
            cursor: disabled ? 'default' : 'pointer',
            fontFamily: "'DM Sans',sans-serif", fontSize: 14,
            fontWeight: state ? 600 : 400, textAlign: 'left', width: '100%',
            display: 'flex', alignItems: 'center', gap: 10,
            transition: 'all 0.18s ease',
            transform: hov && !disabled && !state ? 'translateY(-1px)' : 'none',
            boxShadow: isC ? '0 0 18px oklch(65% 0.2 145 / 0.28)'
              : isW ? '0 0 18px oklch(62% 0.22 20 / 0.28)'

          }}
        >
          {state && (
            <span style={{
              width:18, height:18, flexShrink:0, borderRadius:'50%',
              background: isC ? 'var(--correct)' : 'var(--wrong)',
              color:'#fff', fontSize:10, fontWeight:700,

          )}
          <span style={{ textWrap: 'pretty' }}>{label}</span>
        </button>
      );
    }

    // ── QUIZ CARD ────────────────────────────────────────────────────────────
    function QuizCard({ question, onAnswer, questionIndex, totalQuestions, results, tweaks }) {
      const [selected, setSelected] = useState(null);
      const [revealed, setRevealed] = useState(false);

      function pick(opt) {
        if (revealed) return;
        const correct = opt === question.answer;
        setSelected(opt); setRevealed(true);
        correct ? playCorrect() : playWrong();
        setTimeout(() => onAnswer(correct), tweaks.autoAdvanceDelay * 1000);
      }

      const getState = opt => {
        if (!revealed) return null;
        if (opt === question.answer) return 'correct';
        if (opt === selected)        return 'wrong';
        return null;
      };

      return (
        <div style={{
          background: 'var(--surface)', border: '1px solid var(--border)',
          borderRadius: 20, padding: '32px 36px', width: '100%', maxWidth: 640,
          boxShadow: '0 24px 64px oklch(0% 0 0 / 0.55), 0 0 0 1px oklch(100% 0 0 / 0.03)',
          animation: 'slideUp 0.32s cubic-bezier(0.22,1,0.36,1)',
        }}>
          <ProgressBar current={questionIndex} total={totalQuestions} results={results} />

          {/* Lyric block */}
          <div style={{
            background: 'var(--bg2)', border: '1px solid var(--border)',
            borderLeft: '3px solid var(--rose)', borderRadius: 12,
            padding: '20px 24px', marginBottom: 16,
          }}>

            <p style={{
              fontFamily: "'Playfair Display',serif", fontStyle: 'italic',
              fontSize: tweaks.lyricFontSize, lineHeight: 1.65,
              whiteSpace: 'pre-line', color: 'var(--text)', textWrap: 'pretty',
            }}>"{question.lyric}"</p>
          </div>

          <p style={{
            fontSize: 11, color: 'var(--text-dim)', textTransform: 'uppercase',
            letterSpacing: '0.1em', fontWeight: 600, marginBottom: 14,
          }}>Which song is this from?</p>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            {question.options.map(opt => (
              <OptionButton key={opt} label={opt} state={revealed ? getState(opt) : null}
                            onClick={() => pick(opt)} disabled={revealed} />
            ))}
          </div>
        </div>
      );
    }

    // ── NAME ENTRY SCREEN ─────────────────────────────────────────────────────
    function NameEntryScreen({ timeMs, onSubmit, onSkip }) {
      const [name,   setName]   = useState('');
      const [hov,    setHov]    = useState(false);
      const [saving, setSaving] = useState(false);
      const [error,  setError]  = useState('');
      const inputRef            = useRef(null);
      useEffect(() => { inputRef.current?.focus(); }, []);

      async function submit() {
        const trimmed = name.trim(); if (!trimmed) return;
        setSaving(true); setError('');
        try { await onSubmit(trimmed); }
        catch { setError('Could not save — check your connection and try again.'); setSaving(false); }
      }

      return (
        <div style={{
          background:'var(--surface)', border:'1px solid var(--border)',
          borderRadius:20, padding:'48px 44px', width:'100%', maxWidth:480,
          textAlign:'center', boxShadow:'0 24px 64px oklch(0% 0 0/0.55)',
          animation:'popIn 0.4s cubic-bezier(0.22,1,0.36,1)',
        }}>
          <div style={{ fontSize:44, marginBottom:14 }}>✨</div>
          <h2 style={{
            fontFamily:"'Playfair Display',serif", fontSize:28, fontWeight:700,
            lineHeight:1.2, marginBottom:8,
            background:'linear-gradient(135deg,var(--rose),var(--gold))',
            WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
          }}>Perfect Score!</h2>
          <p style={{ color:'var(--text-muted)', fontSize:14, marginBottom:8 }}>

          </p>
          <div style={{
            fontFamily:"'Playfair Display',serif", fontStyle:'italic',
            fontSize:36, color:'var(--gold)', fontVariantNumeric:'tabular-nums', marginBottom:28,
          }}>{formatTime(timeMs)}</div>

          {window.Leaderboard ? (<>
            <p style={{ color:'var(--text-muted)', fontSize:13, marginBottom:14 }}>Enter your name for the leaderboard:</p>
            <input ref={inputRef} value={name} onChange={e => setName(e.target.value)}
              onKeyDown={e => e.key==='Enter' && submit()}
              placeholder="Your name…" maxLength={30} disabled={saving}
              style={{
                width:'100%', background:'var(--bg2)', border:'1.5px solid var(--border)',
                borderRadius:10, padding:'12px 16px', color:'var(--text)',
                fontFamily:"'DM Sans',sans-serif", fontSize:15,
                outline:'none', marginBottom: error?8:16, transition:'border-color 0.2s',
                opacity: saving?0.6:1,
              }}
              onFocus={e => e.target.style.borderColor='var(--purple)'}
              onBlur={e  => e.target.style.borderColor='var(--border)'}
            />
            {error && <p style={{ color:'var(--wrong)', fontSize:12, marginBottom:12 }}>{error}</p>}
            <button onClick={submit} disabled={!name.trim()||saving}
              onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
              style={{
                width:'100%',
                background: name.trim()&&!saving
                  ? `linear-gradient(135deg,${hov?'var(--rose-dim),var(--purple-dim)':'var(--rose),var(--purple)'})`

                border:'none', borderRadius:12, padding:'14px',

                transition:'all 0.2s ease', marginBottom:12,
                transform: hov&&name.trim()&&!saving?'translateY(-2px)':'none',
                boxShadow: hov&&name.trim()&&!saving?'0 8px 24px oklch(60% 0.18 10/0.42)':'none',
              }}
            >{saving ? 'Saving…' : 'Submit to Leaderboard'}</button>
          </>) : (
            <p style={{ color:'var(--text-dim)', fontSize:13, marginBottom:20, fontStyle:'italic' }}>
              Connect Firebase in firebase-config.js to enable the leaderboard.
            </p>
          )}

            background:'none', border:'none', color:'var(--text-dim)',
            fontFamily:"'DM Sans',sans-serif", fontSize:13, cursor:'pointer',
            textDecoration:'underline', textUnderlineOffset:3,
          }}>Skip → View results</button>
        </div>
      );
    }

              WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
            }}>Swiftie Leaderboard</h2>
            <p style={{ color:'var(--text-dim)', fontSize:13, marginTop:6 }}>Perfect scores only · ranked by time</p>
          </div>

          <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:28 }}>
            {loading && (
              <p style={{ textAlign:'center', color:'var(--text-dim)', fontSize:14, padding:'20px 0', fontStyle:'italic' }}>Loading…</p>
            )}
            {!loading && !firebaseConnected && (
              <p style={{ textAlign:'center', color:'var(--text-dim)', fontSize:13, padding:'20px 0', lineHeight:1.6 }}>
                Leaderboard not connected.<br />
                Fill in <strong style={{ color:'var(--text-muted)' }}>firebase-config.js</strong> to enable it.<br />
                See <strong style={{ color:'var(--text-muted)' }}>SETUP.md</strong> for instructions.
              </p>
            )}
            {!loading && firebaseConnected && entries.length === 0 && (
              <p style={{ textAlign:'center', color:'var(--text-dim)', fontSize:14, padding:'20px 0', fontStyle:'italic' }}>
                No perfect scores yet — be the first!
              </p>
            )}
            {!loading && entries.map((e,i) => (
              <div key={i} style={{
                display:'flex', alignItems:'center', gap:14,
                background: i===0?'oklch(22% 0.08 65)':'var(--bg2)',
                border:`1px solid ${i===0?'oklch(78% 0.14 65/0.3)':'var(--border)'}`,
                borderRadius:12, padding:'12px 16px',
              }}>
                <span style={{ fontSize:i<3?20:14, width:28, textAlign:'center', flexShrink:0, color:i<3?undefined:'var(--text-dim)', fontWeight:600 }}>
                  {i<3 ? medals[i] : `${i+1}`}
                </span>
                <span style={{ flex:1, fontSize:14, fontWeight:500, color:i===0?'var(--gold)':'var(--text)' }}>{e.name}</span>
                <span style={{ fontFamily:"'Playfair Display',serif", fontStyle:'italic', fontSize:16, color:i===0?'var(--gold)':'var(--text-muted)', fontVariantNumeric:'tabular-nums' }}>
                  {formatTime(e.timeMs)}
                </span>
              </div>
            ))}
          </div>

          <button onClick={onRestart}
            onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
            style={{
              width:'100%',
              background:`linear-gradient(135deg,${hov?'var(--rose-dim),var(--purple-dim)':'var(--rose),var(--purple)'})`,
              border:'none', borderRadius:12, padding:'14px',
              color:'#fff', fontFamily:"'DM Sans',sans-serif", fontSize:15, fontWeight:600, cursor:'pointer',
              transition:'all 0.2s ease', transform:hov?'translateY(-2px)':'none',
              boxShadow:hov?'0 8px 24px oklch(60% 0.18 10/0.42)':'0 4px 12px oklch(60% 0.18 10/0.25)',
            }}
          >Play Again</button>
        </div>
      );
    }

    // ── APP ──────────────────────────────────────────────────────────────────
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "autoAdvanceDelay": 1,
      "lyricFontSize": 21,
      "showEraBadges": true
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak]   = useTweaks(TWEAK_DEFAULTS);
      const [screen, setScreen]  = useState('welcome'); // welcome | quiz | name-entry | results | leaderboard
      const [questions, setQ]    = useState([]);
      const [current, setCurrent]= useState(0);
      const [results, setResults]= useState([]);
      const [score, setScore]    = useState(0);
      const [startTime, setStart]= useState(null);
      const [elapsedMs, setMs]   = useState(0);
      const [lbEntries, setLb]   = useState([]);
      const [lbLoading, setLbL]  = useState(false);
      const lbUnsubRef           = useRef(null);

      // Subscribe to leaderboard when on that screen; unsubscribe on leave
      useEffect(() => {
        if (screen !== 'leaderboard') {
          if (lbUnsubRef.current) { lbUnsubRef.current(); lbUnsubRef.current = null; }
          return;
        }
        if (!window.Leaderboard) return;
        setLbL(true);
        if (window.Leaderboard.subscribeToEntries) {
          lbUnsubRef.current = window.Leaderboard.subscribeToEntries(entries => {
            setLb(entries); setLbL(false);
          });
        } else {
          window.Leaderboard.getEntries()
            .then(e => { setLb(e); setLbL(false); })
            .catch(() => { setLb([]); setLbL(false); });
        }
      }, [screen]);

      function startGame() {
        setQ(buildQuiz()); setCurrent(0); setResults([]); setScore(0);
        setStart(Date.now()); setScreen('quiz');
      }

      function handleAnswer(correct) {
        const newResults = [...results, correct ? 'correct' : 'wrong'];
        const newScore   = score + (correct ? 1 : 0);
        setResults(newResults); setScore(newScore);
        if (current + 1 >= questions.length) {
          setMs(Date.now() - startTime);
          setTimeout(() => setScreen(newScore === questions.length ? 'name-entry' : 'results'), 300);
        } else {
          setCurrent(c => c + 1);
        }
      }

      async function handleNameSubmit(name) {
        if (window.Leaderboard) await window.Leaderboard.addEntry({ name, timeMs: elapsedMs });
        setScreen('leaderboard');
      }

      return (
        <div style={{
          position:'relative', zIndex:1,
          width:'100vw', height:'100vh',
          display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center',
          padding:20, overflow:'auto',
        }}>
          {screen === 'welcome' && (
            <WelcomeScreen onStart={startGame} onLeaderboard={() => setScreen('leaderboard')} />
          )}

          {screen === 'quiz' && questions.length > 0 && (<>
            <TimerBadge startTime={startTime} />
            <HomeButton onClick={() => setScreen('welcome')} />
            <QuizCard
              key={current}
              question={questions[current]}
              onAnswer={handleAnswer}
              questionIndex={current}
              totalQuestions={questions.length}
              results={results}
              tweaks={tweaks}
            />
          </>)}

          {screen === 'results' && (
            <ResultsScreen
              score={score} total={questions.length}
              questions={questions} results={results}
              elapsedMs={elapsedMs} onRestart={startGame}
              onLeaderboard={() => setScreen('leaderboard')}
            />
          )}

          {screen === 'name-entry' && (
            <NameEntryScreen
              timeMs={elapsedMs}
              onSubmit={handleNameSubmit}
              onSkip={() => setScreen('results')}
            />
          )}

          {screen === 'leaderboard' && (
            <LeaderboardScreen
              entries={lbEntries} loading={lbLoading}
              firebaseConnected={!!window.Leaderboard}
              onBack={() => setScreen('welcome')}
              onRestart={startGame}
            />
          )}

          <TweaksPanel title="Quiz Tweaks">
            <TweakSection label="Gameplay" />
            <TweakSlider label="Auto-advance delay" unit="s"
              min={0.5} max={4} step={0.5} value={tweaks.autoAdvanceDelay}
              onChange={v => setTweak('autoAdvanceDelay', v)} />
            <TweakSection label="Display" />
            <TweakSlider label="Lyric font size" unit="px"
              min={15} max={30} step={1} value={tweaks.lyricFontSize}
              onChange={v => setTweak('lyricFontSize', v)} />
            <TweakToggle label="Show era badges" value={tweaks.showEraBadges}
              onChange={v => setTweak('showEraBadges', v)} />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- Firebase realtime leaderboard (ESM module — runs after other scripts) -->
  <script type="module" src="firebase.js"></script>

</body>
</html>
