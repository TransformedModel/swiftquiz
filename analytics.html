<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwiftQuiz · Analytics</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0a1a;
      --bg2:      #14101f;
      --surface:  #1a1428;
      --border:   #2e2540;
      --rose:     #e8607a;
      --gold:     #d4a843;
      --purple:   #9b6fd4;
      --text:     #f0edf8;
      --muted:    #8b82a8;
      --dim:      #55496e;
      --correct:  #4caf82;
      --wrong:    #e06060;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Lock screen ── */
    #lock {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; flex-direction: column; gap: 16px;
    }
    #lock h1 {
      font-size: 22px; font-weight: 700;
      background: linear-gradient(135deg, var(--rose), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #lock p  { color: var(--muted); font-size: 13px; }
    #lock input {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 11px 16px; color: var(--text);
      font-size: 15px; width: 280px; outline: none;
    }
    #lock input:focus { border-color: var(--purple); }
    #lock button {
      background: linear-gradient(135deg, var(--rose), var(--purple));
      border: none; border-radius: 10px; padding: 11px 32px;
      color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
      width: 280px;
    }
    #lock .err { color: var(--wrong); font-size: 12px; min-height: 16px; }

    /* ── Dashboard shell ── */
    #dash { display: none; }

    header {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 {
      font-size: 17px; font-weight: 700;
      background: linear-gradient(135deg, var(--rose), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    header .meta { color: var(--dim); font-size: 12px; }
    header .actions { display: flex; gap: 10px; align-items: center; }
    header button {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 14px; color: var(--muted);
      font-size: 12px; cursor: pointer;
    }
    header button:hover { border-color: var(--purple); color: var(--text); }

    main { max-width: 1200px; margin: 0 auto; padding: 28px 24px 60px; }

    /* ── Stat cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px; margin-bottom: 28px;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 20px;
    }
    .card .label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
    .card .value { font-size: 28px; font-weight: 700; line-height: 1; }
    .card .sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .card.rose   .value { color: var(--rose); }
    .card.gold   .value { color: var(--gold); }
    .card.purple .value { color: var(--purple); }
    .card.green  .value { color: var(--correct); }

    /* ── Sections ── */
    .section { margin-bottom: 28px; }
    .section h2 {
      font-size: 13px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .08em; color: var(--gold); margin-bottom: 14px;
    }
    .panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px 22px;
    }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 700px) { .row2 { grid-template-columns: 1fr; } }

    /* ── Charts ── */
    .chart-wrap { position: relative; height: 240px; }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 7px 10px; color: var(--dim); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); }
    td { padding: 8px 10px; border-bottom: 1px solid #1f1830; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1f1830; }
    .tag {
      display: inline-block; border-radius: 5px; padding: 2px 7px;
      font-size: 11px; font-weight: 600;
    }
    .tag.ok  { background: #1a3028; color: var(--correct); }
    .tag.no  { background: #2a1a1a; color: var(--wrong); }
    .tag.mid { background: #1e1830; color: var(--purple); }
    .flag { font-size: 16px; margin-right: 4px; }

    /* ── Spinner ── */
    .spin {
      display: flex; align-items: center; justify-content: center;
      height: 200px; color: var(--dim); font-size: 13px; gap: 10px;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--border); border-top-color: var(--rose);
      animation: rotate .7s linear infinite;
    }
  </style>
</head>
<body>

<!-- ── Lock screen ─────────────────────────────────────── -->
<div id="lock">
  <h1>✦ SwiftQuiz Analytics</h1>
  <p>Enter your report token to continue</p>
  <input id="tok" type="password" placeholder="Report token…" autocomplete="off" />
  <div class="err" id="err"></div>
  <button id="unlock">Unlock Dashboard</button>
</div>

<!-- ── Dashboard ──────────────────────────────────────── -->
<div id="dash">
  <header>
    <h1>✦ SwiftQuiz Analytics</h1>
    <span class="meta" id="gen-ts"></span>
    <div class="actions">
      <button id="refresh-btn">↺ Refresh</button>
      <button id="logout-btn">Lock</button>
    </div>
  </header>

  <main>
    <!-- Stat cards -->
    <div class="cards" id="cards"></div>

    <!-- Drop-off funnel -->
    <div class="section">
      <h2>Drop-off Funnel — questions reached</h2>
      <div class="panel">
        <div class="chart-wrap"><canvas id="dropoff-chart"></canvas></div>
      </div>
    </div>

    <!-- Question difficulty -->
    <div class="section">
      <h2>Question Difficulty — correct vs wrong</h2>
      <div class="panel">
        <div class="chart-wrap"><canvas id="q-chart"></canvas></div>
      </div>
    </div>

    <!-- Location + cities -->
    <div class="section">
      <h2>Visitors by Location</h2>
      <div class="row2">
        <div class="panel">
          <table id="country-table">
            <thead><tr><th>Country</th><th style="text-align:right">Visitors</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="panel">
          <table id="city-table">
            <thead><tr><th>City</th><th style="text-align:right">Visitors</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Recent sessions -->
    <div class="section">
      <h2>Recent Sessions</h2>
      <div class="panel" style="overflow-x:auto">
        <table id="sessions-table">
          <thead><tr>
            <th>Time</th><th>Location</th><th>Device</th><th>Visitor</th>
            <th>Qs reached</th><th>Result</th><th>Score</th><th>Quiz time</th><th>Page time</th>
          </tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────
  // Update after deploying the Worker:
  const WORKER = 'https://swiftquiz-analytics.niharikakohli29.workers.dev';

  // ── Auth ────────────────────────────────────────────────────
  let reportToken = sessionStorage.getItem('sq_token') || '';
  if (reportToken) attemptLoad();

  document.getElementById('tok').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('unlock').click();
  });
  document.getElementById('unlock').addEventListener('click', () => {
    reportToken = document.getElementById('tok').value.trim();
    attemptLoad();
  });
  document.getElementById('logout-btn').addEventListener('click', () => {
    sessionStorage.removeItem('sq_token');
    location.reload();
  });
  document.getElementById('refresh-btn').addEventListener('click', loadReport);

  async function attemptLoad() {
    document.getElementById('err').textContent = '';
    document.getElementById('unlock').textContent = 'Checking…';
    try {
      await loadReport();
      sessionStorage.setItem('sq_token', reportToken);
      document.getElementById('lock').style.display = 'none';
      document.getElementById('dash').style.display  = 'block';
    } catch (e) {
      document.getElementById('err').textContent = e.message || 'Invalid token';
      document.getElementById('unlock').textContent = 'Unlock Dashboard';
    }
  }

  // ── Fetch & render ──────────────────────────────────────────
  let dropoffChart = null;
  let qChart       = null;

  async function loadReport() {
    const res = await fetch(`${WORKER}/report?token=${encodeURIComponent(reportToken)}`);
    if (res.status === 401) throw new Error('Invalid token — check REPORT_TOKEN');
    if (!res.ok)            throw new Error(`Worker error ${res.status}`);
    const d = await res.json();
    render(d);
  }

  function render(d) {
    // Timestamp
    document.getElementById('gen-ts').textContent =
      'Data as of ' + new Date(d.generated).toLocaleString();

    // ── Cards ──
    const uniqueV    = d.uniqueVisitors ?? d.totalSessions;
    const repeatPct  = uniqueV > 0 ? pct(d.repeatVisitors / uniqueV) : '—';
    const mobilePct  = uniqueV > 0 ? pct((d.mobileVisitors ?? 0) / uniqueV) : '—';
    document.getElementById('cards').innerHTML = `
      ${card('Unique Visitors',  uniqueV,                                  `${d.totalSessions} sessions total`,  'rose')}
      ${card('New / Returning',  `${d.newVisitors ?? '—'} / ${d.repeatVisitors ?? '—'}`, `${repeatPct} returning`, '')}
      ${card('Mobile / Desktop', `${d.mobileVisitors ?? '—'} / ${d.desktopVisitors ?? '—'}`, `${mobilePct} mobile`, 'purple')}
      ${card('Avg Time on Page', d.avgTimeOnPageMs ? fmtMs(d.avgTimeOnPageMs) : '—', 'all sessions',           '')}
      ${card('Quiz Starts',      d.quizStarts,                             `${pct(d.quizStarts/Math.max(1,uniqueV))} of visitors`, 'gold')}
      ${card('Completions',      d.quizCompletions,                        `${pct(d.completionRate)} finish rate`, 'green')}
      ${card('Perfect Scores',   d.perfectScores,                          `${pct(d.perfectScores/Math.max(1,d.quizCompletions))} of completions`, 'green')}
      ${card('Avg Score',        d.avgScore !== null ? `${d.avgScore}/15` : '—', d.avgTimeMs ? 'avg quiz time ' + fmtMs(d.avgTimeMs) : '', '')}
    `;

    // ── Drop-off chart ──
    const dropLabels = d.dropoff.map((_,i) => `Q${i+1}`);
    if (dropoffChart) dropoffChart.destroy();
    dropoffChart = new Chart(document.getElementById('dropoff-chart'), {
      type: 'bar',
      data: {
        labels: dropLabels,
        datasets: [{
          label: 'Reached question',
          data: d.dropoff,
          backgroundColor: d.dropoff.map((v, i, a) => {
            const ratio = a[0] > 0 ? v / a[0] : 1;
            return `oklch(${55 + ratio*15}% 0.18 ${10 + ratio*130})`;
          }),
          borderRadius: 6,
        }],
      },
      options: chartOpts('Players', d.dropoff),
    });

    // ── Question difficulty chart ──
    if (qChart) qChart.destroy();
    qChart = new Chart(document.getElementById('q-chart'), {
      type: 'bar',
      data: {
        labels: d.questionStats.map(q => `Q${q.index+1}`),
        datasets: [
          { label: 'Correct', data: d.questionStats.map(q => q.correct), backgroundColor: '#4caf8299', borderRadius: 4 },
          { label: 'Wrong',   data: d.questionStats.map(q => q.wrong),   backgroundColor: '#e0606099', borderRadius: 4 },
        ],
      },
      options: { ...chartOpts('Answers'), plugins: { ...chartOpts('Answers').plugins, legend: { display: true, labels: { color: '#8b82a8' } } }, scales: { ...chartOpts('Answers').scales, x: { ...chartOpts('Answers').scales.x, stacked: true }, y: { ...chartOpts('Answers').scales.y, stacked: true } } },
    });

    // ── Countries ──
    const cTbody = document.querySelector('#country-table tbody');
    cTbody.innerHTML = d.countries.map(c =>
      `<tr><td>${flag(c.country)} ${countryName(c.country)}</td><td style="text-align:right;color:var(--gold)">${c.count}</td></tr>`
    ).join('') || '<tr><td colspan="2" style="color:var(--dim);padding:16px">No data yet</td></tr>';

    // ── Cities ──
    const citTbody = document.querySelector('#city-table tbody');
    citTbody.innerHTML = d.cities.map(c =>
      `<tr><td>${flag(c.country)} ${c.city}</td><td style="text-align:right;color:var(--gold)">${c.count}</td></tr>`
    ).join('') || '<tr><td colspan="2" style="color:var(--dim);padding:16px">No data yet</td></tr>';

    // ── Recent sessions ──
    const sTbody = document.querySelector('#sessions-table tbody');
    sTbody.innerHTML = d.recent.map(s => {
      const result = !s.started ? `<span class="tag no">Bounced</span>`
        : s.completed && s.perfect ? `<span class="tag ok">Perfect ✓</span>`
        : s.completed              ? `<span class="tag ok">Completed</span>`
        :                            `<span class="tag mid">Abandoned Q${s.questionsAnswered}</span>`;
      const deviceIcon = s.deviceType === 'mobile' ? '📱' : s.deviceType === 'desktop' ? '💻' : '—';
      const visitorTag = s.isRepeatVisitor === true  ? `<span class="tag mid">Returning</span>`
                       : s.isRepeatVisitor === false ? `<span class="tag ok">New</span>` : '—';
      return `<tr>
        <td style="color:var(--dim);white-space:nowrap">${fmtDate(s.ts)}</td>
        <td>${flag(s.country)}${s.city || s.country || '—'}</td>
        <td style="text-align:center">${deviceIcon}</td>
        <td>${visitorTag}</td>
        <td style="color:var(--muted)">${s.started ? s.questionsAnswered + ' / 15' : '—'}</td>
        <td>${result}</td>
        <td style="color:var(--gold)">${s.score !== null ? s.score + '/15' : '—'}</td>
        <td style="color:var(--muted)">${s.totalMs ? fmtMs(s.totalMs) : '—'}</td>
        <td style="color:var(--muted)">${s.timeOnPage ? fmtMs(s.timeOnPage) : '—'}</td>
      </tr>`;
    }).join('') || '<tr><td colspan="9" style="color:var(--dim);padding:16px">No sessions yet</td></tr>';
  }

  // ── Helpers ─────────────────────────────────────────────────
  function card(label, value, sub, cls) {
    return `<div class="card ${cls}">
      <div class="label">${label}</div>
      <div class="value">${value}</div>
      ${sub ? `<div class="sub">${sub}</div>` : ''}
    </div>`;
  }

  function chartOpts(yLabel, data) {
    return {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y}` } } },
      scales: {
        x: { grid: { color: '#1f1830' }, ticks: { color: '#55496e' } },
        y: { grid: { color: '#1f1830' }, ticks: { color: '#55496e' }, title: { display: true, text: yLabel, color: '#55496e' } },
      },
    };
  }

  function pct(r) { return r !== null && isFinite(r) ? Math.round(r * 100) + '%' : '—'; }

  function fmtMs(ms) {
    if (!ms) return '—';
    const s = Math.floor(ms / 1000), m = Math.floor(s / 60);
    return m > 0 ? `${m}:${String(s % 60).padStart(2,'0')}` : `${s}s`;
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function flag(code) {
    if (!code || code.length !== 2) return '';
    const c = code.toUpperCase();
    return String.fromCodePoint(...[...c].map(ch => 0x1F1E6 + ch.charCodeAt(0) - 65)) + ' ';
  }

  const NAMES = { US:'United States', GB:'United Kingdom', IN:'India', AU:'Australia', CA:'Canada', DE:'Germany', FR:'France', NL:'Netherlands', SG:'Singapore', NZ:'New Zealand', IE:'Ireland', PH:'Philippines', ZA:'South Africa', BR:'Brazil', MX:'Mexico', JP:'Japan', KR:'South Korea', SE:'Sweden', NO:'Norway', DK:'Denmark' };
  function countryName(code) { return NAMES[code] || code; }
</script>
</body>
</html>
